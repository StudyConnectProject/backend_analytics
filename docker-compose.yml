services:
  analytics-service:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: analytics-service
    ports:
      - "3003:3003"
    environment:
      - NODE_ENV=production
      - PORT=3003
      - DATABASE_URL=postgresql://neondb_owner:npg_xKLJQUj4B5hH@ep-broad-hill-apqdh7jl-pooler.c-7.us-east-1.aws.neon.tech/neondb?sslmode=require&channel_binding=require
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3003/health', (r) => {if (r.statusCode !== 200) throw new Error(r.statusCode)})"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    restart: unless-stopped
    networks:
      - microservices

networks:
  microservices:
    driver: bridge
